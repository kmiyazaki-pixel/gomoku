<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOMOKU 五目並べ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

  .view { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .view.active { display: flex; }

  /* ── Start ── */
  #view-start h1 { font-size: 3rem; letter-spacing: .3em; color: #f0c060; margin-bottom: .2em; }
  #view-start p.sub { color: #aaa; margin-bottom: 2em; }
  .card { background: #16213e; border-radius: 16px; padding: 28px 36px; width: 100%; max-width: 380px; }
  .card label { display: block; font-size: .8rem; color: #aaa; margin: 14px 0 5px; text-transform: uppercase; letter-spacing: .07em; }
  .card input[type=text],
  .card select { width: 100%; padding: 10px 14px; border: none; border-radius: 8px; background: #0f3460; color: #fff; font-size: 1rem; appearance: none; cursor: pointer; }
  .card select option { background: #0f3460; }
  .btn-primary { width: 100%; margin-top: 22px; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg,#f0c060,#e09020); color: #1a1a2e; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
  .btn-primary:hover { opacity: .9; }
  .btn-secondary { margin-top: 10px; width: 100%; padding: 10px; border: 2px solid #555; border-radius: 10px; background: transparent; color: #aaa; font-size: .95rem; cursor: pointer; }
  .btn-secondary:hover { border-color: #fff; color: #fff; }

  /* ── Room ── */
  #view-room .card { max-width: 340px; }

  /* ── Game ── */
  #view-play { padding: 0; }
  .game-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; }
  .game-header { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 700px; padding: 14px 20px; }
  .turn-banner { font-size: 1rem; font-weight: 600; background: #16213e; border-radius: 8px; padding: 8px 16px; }
  .score-wrap { display: flex; gap: 12px; font-size: .9rem; }
  .score-item { background: #16213e; border-radius: 8px; padding: 6px 14px; }
  .btn-back { background: none; border: 2px solid #555; border-radius: 8px; color: #aaa; padding: 6px 14px; cursor: pointer; font-size: .85rem; }
  .btn-back:hover { border-color: #fff; color: #fff; }

  /* ── Board ── */
  .board-outer { background: #dcb06a; border-radius: 4px; padding: 20px; box-shadow: 0 8px 32px #0006; }
  canvas#board-canvas { display: block; cursor: pointer; }

  /* ── Overlay ── */
  .overlay { display: none; position: fixed; inset: 0; background: #0009; align-items: center; justify-content: center; z-index: 100; }
  .overlay.active { display: flex; }
  .overlay-box { background: #16213e; border-radius: 16px; padding: 36px 40px; text-align: center; max-width: 320px; width: 90%; }
  .overlay-box h2 { font-size: 1.8rem; color: #f0c060; margin-bottom: .5em; }
  .overlay-box p { color: #aaa; margin-bottom: 1.2em; }
  .overlay-box input[type=text] { width: 100%; padding: 10px 14px; border: none; border-radius: 8px; background: #0f3460; color: #fff; font-size: 1rem; margin-bottom: 12px; }
  .spinner { width: 48px; height: 48px; border: 5px solid #444; border-top-color: #f0c060; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Ranking ── */
  #screen-ranking { display: none; flex-direction: column; align-items: center; min-height: 100vh; padding: 30px 20px; }
  #screen-ranking.active { display: flex; }
  .tab-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .tab-bar button { padding: 8px 16px; border: 2px solid #333; border-radius: 8px; background: none; color: #aaa; cursor: pointer; }
  .tab-bar button.active { border-color: #f0c060; color: #f0c060; }
  .rank-table { width: 100%; max-width: 460px; border-collapse: collapse; }
  .rank-table th { color: #f0c060; padding: 10px 14px; border-bottom: 1px solid #333; text-align: left; }
  .rank-table td { padding: 10px 14px; border-bottom: 1px solid #222; }

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
</style>
</head>
<body>

<!-- START -->
<div id="view-start" class="view active">
  <h1>GOMOKU</h1>
  <p class="sub">五目並べ</p>
  <div class="card">
    <label>プレイヤー名</label>
    <input type="text" id="input-name" placeholder="名前を入力" maxlength="20">

    <label>モード</label>
    <select id="sel-mode" onchange="onModeChange()">
      <option value="VS_AI">AI対戦</option>
      <option value="VS_HUMAN">オンライン対戦</option>
    </select>

    <div id="ai-options">
      <label>難易度</label>
      <select id="sel-diff">
        <option value="EASY">やさしい</option>
        <option value="NORMAL" selected>ふつう</option>
        <option value="HARD">むずかしい</option>
        <option value="EXPERT">鬼</option>
      </select>

      <label>先攻・後攻</label>
      <select id="sel-color">
        <option value="black">先攻（黒）</option>
        <option value="white">後攻（白）</option>
      </select>
    </div>

    <button class="btn-primary" onclick="startGame()">ゲームスタート</button>
    <button class="btn-secondary" onclick="showRanking()">ランキング</button>
  </div>
</div>

<!-- ROOM -->
<div id="view-room" class="view">
  <div class="card">
    <h2 style="margin-bottom:16px;color:#f0c060">オンライン対戦</h2>
    <label>ルームID</label>
    <input type="text" id="input-room" placeholder="例: abc123" maxlength="20">
    <button class="btn-primary" onclick="joinRoom()">入室する</button>
    <button class="btn-secondary" onclick="showView('view-start')">もどる</button>
  </div>
</div>

<!-- GAME -->
<div id="view-play" class="view">
  <div class="game-wrap">
    <div class="game-header">
      <button class="btn-back" onclick="showView('view-start')">← もどる</button>
      <div class="turn-banner" id="turn-banner">黒の番</div>
      <div class="score-wrap">
        <div class="score-item">⚫ <span id="black-score">0</span></div>
        <div class="score-item">⚪ <span id="white-score">0</span></div>
      </div>
    </div>
    <div class="board-outer">
      <canvas id="board-canvas"></canvas>
    </div>
  </div>
</div>

<!-- RANKING -->
<div id="screen-ranking">
  <h2 style="color:#f0c060;margin-bottom:20px">ランキング</h2>
  <div class="tab-bar" id="rank-tabs">
    <button class="active" onclick="switchRankTab('EASY',this)">やさしい</button>
    <button onclick="switchRankTab('NORMAL',this)">ふつう</button>
    <button onclick="switchRankTab('HARD',this)">むずかしい</button>
    <button onclick="switchRankTab('EXPERT',this)">鬼</button>
  </div>
  <table class="rank-table">
    <thead><tr><th>#</th><th>名前</th><th>手数</th></tr></thead>
    <tbody id="rank-tbody"></tbody>
  </table>
  <button class="btn-secondary" style="max-width:200px;margin-top:24px" onclick="hideRanking()">もどる</button>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="overlay-title"></h2>
    <p id="overlay-msg"></p>
    <input type="text" id="overlay-name" placeholder="名前を入力">
    <button class="btn-primary" id="btn-submit-rank" onclick="submitRanking()">登録する</button>
    <button class="btn-secondary" onclick="closeOverlay()">スキップ</button>
  </div>
</div>

<!-- WAITING OVERLAY -->
<div class="overlay" id="waiting-overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <h2 style="font-size:1.2rem">対戦相手を待っています…</h2>
    <p id="waiting-room-id" style="margin-top:8px;font-size:.85rem;color:#aaa"></p>
    <button class="btn-secondary" style="margin-top:16px" onclick="leaveRoom()">キャンセル</button>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
// ════════════ BOARD CANVAS ════════════
const BOARD = 15;
const CELL  = 40;
const OFFSET = CELL / 2;
const CANVAS_SIZE = (BOARD - 1) * CELL + CELL;

const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');
canvas.width  = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;
canvas.addEventListener('click', onBoardClick);

// ════════════ STATE ════════════
let gameOver    = false;
let playerColor = 1;
let currentPlayer = 1;
let myColor     = null;
let mode        = 'VS_AI';
let wsConn      = null;
let boardState  = null;
let lastMove    = null;
let winLine     = null;
let rankData    = {};
let currentRankDiff = 'EASY';
let playerName  = 'Player';

// ════════════ UI ════════════
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('screen-ranking').classList.remove('active');
}

function onModeChange() {
  const m = document.getElementById('sel-mode').value;
  mode = m;
  document.getElementById('ai-options').style.display = m === 'VS_AI' ? '' : 'none';
}

// ════════════ GAME START ════════════
async function startGame() {
  playerName = document.getElementById('input-name').value.trim() || 'Player';
  mode = document.getElementById('sel-mode').value;

  if (mode === 'VS_HUMAN') {
    showView('view-room');
    return;
  }

  const diff  = document.getElementById('sel-diff').value;
  const color = document.getElementById('sel-color').value;

  await fetch('/api/name', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: playerName })
  });

  await fetch('/api/new', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ difficulty: diff, color: color, mode: 'VS_AI' })
  });

  // 後攻（白）ならAIに先に打たせる
  let stateRes;
  if (color === 'white') {
    stateRes = await fetch('/api/ai-first', { method: 'POST' });
  } else {
    stateRes = await fetch('/api/state');
  }
  const state = await stateRes.json();

  showView('view-play');
  applyState(state);
}

// ════════════ WEBSOCKET ════════════
function joinRoom() {
  const roomId = document.getElementById('input-room').value.trim();
  if (!roomId) { alert('ルームIDを入力してください'); return; }
  playerName = document.getElementById('input-name').value.trim() || 'Player';

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  wsConn = new WebSocket(`${proto}://${location.host}/ws/room`);
  wsConn.onopen = () => wsConn.send(JSON.stringify({ type: 'join', roomId, name: playerName }));
  wsConn.onmessage = e => handleWsMessage(JSON.parse(e.data), roomId);
  wsConn.onclose = () => { if (!gameOver) alert('接続が切断されました'); };
}

function handleWsMessage(msg, roomId) {
  if (msg.type === 'waiting') {
    document.getElementById('waiting-overlay').classList.add('active');
    document.getElementById('waiting-room-id').textContent = 'ルームID: ' + roomId;
  } else if (msg.type === 'start') {
    myColor = msg.color;
    document.getElementById('waiting-overlay').classList.remove('active');
    applyState({ board: Array.from({length:15}, ()=>new Array(15).fill(0)), currentPlayer:1, gameOver:false, winner:null, winLine:null, blackScore:0, whiteScore:0, playerColor: myColor, lastRow:-1, lastCol:-1 });
    showView('view-play');
  } else if (msg.type === 'update') {
    applyState({ ...msg, playerColor: myColor });
  } else if (msg.type === 'opponent_left') {
    alert('相手が退出しました'); showView('view-start');
  } else if (msg.type === 'error') {
    alert(msg.message); showView('view-start');
  }
}

function leaveRoom() {
  if (wsConn) wsConn.close();
  document.getElementById('waiting-overlay').classList.remove('active');
  showView('view-start');
}

// ════════════ BOARD CLICK ════════════
async function onBoardClick(e) {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const col = Math.round((e.clientX - rect.left - OFFSET) / CELL);
  const row = Math.round((e.clientY - rect.top  - OFFSET) / CELL);
  if (col < 0 || col >= BOARD || row < 0 || row >= BOARD) return;

  if (mode === 'VS_HUMAN' && wsConn) {
    if (currentPlayer !== myColor) return;
    wsConn.send(JSON.stringify({ type: 'move', row, col }));
    return;
  }

  if (currentPlayer !== playerColor) return;

  const res = await fetch('/api/move', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ row, col })
  });
  applyState(await res.json());
}

// ════════════ STATE → UI ════════════
function applyState(state) {
  boardState    = state;
  gameOver      = state.gameOver;
  playerColor   = state.playerColor ?? playerColor;
  currentPlayer = state.currentPlayer;
  lastMove      = (state.lastRow >= 0) ? [state.lastRow, state.lastCol] : null;
  winLine       = state.winLine ?? null;

  document.getElementById('black-score').textContent = state.blackScore ?? 0;
  document.getElementById('white-score').textContent = state.whiteScore ?? 0;
  updateTurnBanner();
  renderBoard(state.board, lastMove, winLine);

  if (state.gameOver) setTimeout(() => showResult(state), 600);
}

function updateTurnBanner() {
  const banner = document.getElementById('turn-banner');
  if (gameOver) { banner.textContent = '終了'; return; }
  const colorName = currentPlayer === 1 ? '⚫ 黒' : '⚪ 白';
  const isMyTurn = mode === 'VS_HUMAN'
    ? currentPlayer === myColor
    : currentPlayer === playerColor;
  banner.textContent = `${colorName}の番${isMyTurn ? '（あなた）' : ''}`;
}

// ════════════ RENDER ════════════
function renderBoard(board, lm, wl) {
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  ctx.fillStyle = '#dcb06a';
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 1;
  for (let i = 0; i < BOARD; i++) {
    const x = OFFSET + i * CELL, y = OFFSET + i * CELL;
    ctx.beginPath(); ctx.moveTo(x, OFFSET); ctx.lineTo(x, OFFSET+(BOARD-1)*CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(OFFSET, y); ctx.lineTo(OFFSET+(BOARD-1)*CELL, y); ctx.stroke();
  }

  [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c]) => {
    ctx.fillStyle = '#8B6914';
    ctx.beginPath(); ctx.arc(OFFSET+c*CELL, OFFSET+r*CELL, 4, 0, Math.PI*2); ctx.fill();
  });

  if (!board) return;

  const wlSet = new Set((wl || []).map(p => `${p[0]},${p[1]}`));

  for (let r = 0; r < BOARD; r++) {
    for (let c = 0; c < BOARD; c++) {
      const v = board[r][c];
      if (!v) continue;
      const cx = OFFSET + c*CELL, cy = OFFSET + r*CELL, rad = CELL*0.45;
      ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2);
      if (v === 1) {
        const g = ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,rad);
        g.addColorStop(0,'#666'); g.addColorStop(1,'#000'); ctx.fillStyle = g;
      } else {
        const g = ctx.createRadialGradient(cx-4,cy-4,2,cx,cy,rad);
        g.addColorStop(0,'#fff'); g.addColorStop(1,'#ccc'); ctx.fillStyle = g;
      }
      ctx.fill();
      if (wlSet.has(`${r},${c}`)) { ctx.strokeStyle='#FFD700'; ctx.lineWidth=3; ctx.stroke(); }
      if (lm && lm[0]===r && lm[1]===c) {
        ctx.fillStyle='rgba(255,60,60,0.85)';
        ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
      }
    }
  }
}

// ════════════ RESULT ════════════
function showResult(state) {
  const isMe = state.winner === (playerColor===1?'black':'white');
  document.getElementById('overlay-title').textContent = state.winner==='draw' ? '引き分け' : isMe ? '🎉 あなたの勝ち！' : (state.winner==='black'?'⚫ 黒':'⚪ 白')+'の勝ち';
  document.getElementById('overlay-msg').textContent   = isMe ? 'ランキングに登録しますか？' : '';
  document.getElementById('overlay-name').value        = playerName;
  document.getElementById('btn-submit-rank').style.display = (isMe && mode==='VS_AI') ? '' : 'none';
  document.getElementById('overlay').classList.add('active');
  if (isMe) launchConfetti();
}

function closeOverlay() { document.getElementById('overlay').classList.remove('active'); }

// ════════════ RANKING ════════════
async function submitRanking() {
  const name  = document.getElementById('overlay-name').value.trim() || playerName;
  const score = (boardState?.blackScore??0) + (boardState?.whiteScore??0);
  const diff  = document.getElementById('sel-diff').value;
  await fetch('/api/ranking/submit', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, score, difficulty: diff })
  });
  closeOverlay(); showRanking();
}

async function showRanking() {
  rankData = await fetch('/api/ranking').then(r => r.json());
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('screen-ranking').classList.add('active');
  renderRankTable(currentRankDiff);
}

function hideRanking() {
  document.getElementById('screen-ranking').classList.remove('active');
  showView('view-start');
}

function switchRankTab(diff, btn) {
  currentRankDiff = diff;
  document.querySelectorAll('#rank-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRankTable(diff);
}

function renderRankTable(diff) {
  const rows = rankData[diff] || [];
  document.getElementById('rank-tbody').innerHTML = rows.length
    ? rows.map((r,i) => `<tr><td>${i+1}</td><td>${esc(r.name)}</td><td>${r.score}手</td></tr>`).join('')
    : '<tr><td colspan="3" style="text-align:center;color:#555">記録なし</td></tr>';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ════════════ CONFETTI ════════════
function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.width = window.innerWidth; cc.height = window.innerHeight;
  const cctx = cc.getContext('2d');
  const pieces = Array.from({length:120}, () => ({
    x: Math.random()*cc.width, y: Math.random()*-cc.height,
    w: 8+Math.random()*8, h: 4+Math.random()*6,
    color: `hsl(${Math.random()*360},80%,60%)`,
    vy: 2+Math.random()*4, vx: (Math.random()-.5)*3,
    angle: Math.random()*360, va: (Math.random()-.5)*5,
  }));
  let frame;
  (function draw() {
    cctx.clearRect(0,0,cc.width,cc.height);
    let done = true;
    pieces.forEach(p => {
      p.y+=p.vy; p.x+=p.vx; p.angle+=p.va;
      if (p.y < cc.height) done = false;
      cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.angle*Math.PI/180);
      cctx.fillStyle=p.color; cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cctx.restore();
    });
    if (!done) frame = requestAnimationFrame(draw);
    else cctx.clearRect(0,0,cc.width,cc.height);
  })();
}

renderBoard(null, null, null);
</script>
</body>
</html>
